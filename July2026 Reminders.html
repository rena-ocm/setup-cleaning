<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Setup Cleaning — July 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bl:#1a3a8f;--gn:#2d6a4f;--pk:#FF69B4;--pu:#7C3AED;--bg:#f0ede8;--br:#d0ccc4;--ink:#1a1a1a;--mu:#666;--rd:#c0392b;--tr:#e67e22}
body{font-family:"Nunito Sans",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;padding-bottom:80px}
.hdr{background:var(--bl);padding:14px 18px;display:flex;align-items:center;gap:12px}
.hdr img{height:38px}.ht{font-family:Nunito,sans-serif;font-weight:800;font-size:16px;color:#fff}
.hs{font-size:11px;color:rgba(255,255,255,.7)}
.tabs{display:flex;background:#122a6e}
.tab{flex:1;padding:10px 4px;color:rgba(255,255,255,.6);cursor:pointer;font-family:Nunito,sans-serif;font-weight:700;font-size:11px;text-align:center;border-bottom:3px solid transparent}
.tab.on{color:#fff;border-bottom-color:#fff}
.pg{display:none}.pg.on{display:block}
.dbar{background:#fff;padding:12px 16px;border-bottom:1px solid var(--br);position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.dlbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mu);font-weight:700;margin-bottom:8px}
.dscr{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.dscr::-webkit-scrollbar{display:none}
.dbtn{flex-shrink:0;padding:8px 12px;background:#f0f0f0;border-radius:10px;cursor:pointer;text-align:center;min-width:52px}
.dbtn.on{background:var(--bl);color:#fff}
.dn{font-family:Nunito,sans-serif;font-weight:800;font-size:18px;display:block;line-height:1}
.dd{font-size:10px;opacity:.7;margin-top:2px;display:block}
.wrap{padding:14px}
.empty{text-align:center;padding:60px 20px;color:var(--mu);font-size:15px;line-height:2.4}
.dtitle{font-family:Nunito,sans-serif;font-weight:800;font-size:18px;color:var(--bl);margin-bottom:10px}
.tbar{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.tlbl{font-family:Nunito,sans-serif;font-weight:700;font-size:13px;margin-bottom:8px}
.mbtns{display:flex;gap:6px;margin-top:6px}
.mbtn{flex:1;padding:8px 4px;border:2px solid var(--br);border-radius:9px;background:#f5f5f5;font-family:Nunito,sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-align:center;color:var(--mu);transition:all .2s}
.mbtn.on{border-color:var(--bl);background:var(--bl);color:#fff}
.mbtn.ont{border-color:var(--tr);background:var(--tr);color:#fff}
.ibox{background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#856404;line-height:1.6}
.tcard{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.thdr{padding:12px 16px;color:#fff;font-family:Nunito,sans-serif;font-weight:800;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.thdr.pk{background:var(--pk)}.thdr.bl{background:#4DA6FF}.thdr.tr{background:var(--tr)}
.thi{font-size:11px;font-weight:600;opacity:.9}
.crow{padding:12px 14px;border-bottom:1px solid #f5f5f5;display:flex;align-items:center;gap:10px}
.crow:last-child{border-bottom:none}.crow.sent{opacity:.35}
.crow.drag-over{background:#eef3ff}.crow.dragging{opacity:.3}
.dh{font-size:18px;color:#bbb;cursor:grab;flex-shrink:0;padding:0 2px;touch-action:none}
.etab{color:#fff;border-radius:8px;padding:5px 9px;font-family:Nunito,sans-serif;font-weight:800;font-size:12px;flex-shrink:0;min-width:72px;text-align:center}
.etab.am{background:var(--bl)}.etab.pm{background:var(--pu)}
.ci{flex:1;min-width:0}.cn{font-weight:600;font-size:14px}
.cd{font-size:10px;color:var(--mu);margin-top:1px}
.cp{font-size:11px;color:var(--mu);margin-top:2px}.cp.no{color:var(--rd)}
.smsa{background:var(--gn);color:#fff;border:none;border-radius:9px;padding:9px 12px;font-family:Nunito,sans-serif;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0;text-decoration:none;display:inline-flex;align-items:center}
.noph{background:#eee;color:#999;border:none;border-radius:9px;padding:9px 10px;font-size:11px;flex-shrink:0;cursor:pointer}
.rmbtn{background:#fff0f0;color:var(--rd);border:1.5px solid #ffcccc;border-radius:8px;padding:8px 9px;font-size:13px;cursor:pointer;flex-shrink:0}
.bbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--br);padding:12px 16px;box-shadow:0 -4px 16px rgba(0,0,0,.1)}
.nbtn{width:100%;padding:14px;background:var(--bl);color:#fff;border:none;border-radius:12px;font-family:Nunito,sans-serif;font-weight:800;font-size:15px;cursor:pointer}
.nbtn.done{background:var(--gn)}.prg{font-size:11px;color:var(--mu);text-align:center;margin-top:5px}
.wacard{background:#fff;border-radius:14px;overflow:hidden;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.wahdr{padding:12px 16px;color:#fff;font-family:Nunito,sans-serif;font-weight:800;font-size:13px}
.wahdr.pk{background:var(--pk)}.wahdr.bl{background:#4DA6FF}.wahdr.tr{background:var(--tr)}
.wabody{padding:16px}
.wamsg{background:#f0f8f0;border:1px solid #c8e6c9;border-radius:10px;padding:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;margin-bottom:10px}
.wacopy{width:100%;padding:11px;background:#25D366;color:#fff;border:none;border-radius:9px;font-family:Nunito,sans-serif;font-weight:700;font-size:13px;cursor:pointer}
.wacopy.ok{background:var(--gn)}
.scard{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:14px}
.shdr{background:var(--bl);color:#fff;padding:12px 16px;font-family:Nunito,sans-serif;font-weight:800;font-size:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.sbdy{display:none;padding:12px 16px}.sbdy.op{display:block}
.smbtns{display:flex;gap:4px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.smbtn{flex:1;padding:6px 4px;border:2px solid var(--br);border-radius:8px;background:#f5f5f5;font-family:Nunito,sans-serif;font-weight:700;font-size:11px;cursor:pointer;text-align:center;color:var(--mu)}
.smbtn.on{border-color:var(--bl);background:var(--bl);color:#fff}
.smbtn.ont{border-color:var(--tr);background:var(--tr);color:#fff}
.slbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px;padding:6px 10px;border-radius:6px;color:#fff}
.slbl.pk{background:var(--pk)}.slbl.bl{background:#4DA6FF}.slbl.tr{background:var(--tr)}
.srow{display:flex;align-items:center;gap:8px;margin-bottom:8px;background:#f8f8f8;border-radius:8px;padding:8px 10px}
.srow.drag-over{background:#ddeeff}.srow.dragging{opacity:.3}
.sdh{color:#bbb;font-size:16px;flex-shrink:0;cursor:grab;touch-action:none}
.scn{flex:1;font-weight:600;font-size:13px}
.sdur{width:62px;padding:6px 8px;border:1.5px solid var(--br);border-radius:6px;font-size:13px;outline:none;text-align:center}
.sdur:focus{border-color:var(--tr)}
.seta{width:76px;padding:6px 8px;background:#e8f4fd;border-radius:6px;font-size:12px;font-family:Nunito,sans-serif;font-weight:700;color:var(--bl);text-align:center}
.srm{background:none;border:none;color:var(--rd);font-size:16px;cursor:pointer;padding:2px 4px}
.sadd{display:flex;gap:8px;margin-top:8px}
.saname{flex:1;padding:7px 10px;border:1.5px dashed var(--br);border-radius:7px;font-size:13px;outline:none}
.sadur{width:65px;padding:7px 8px;border:1.5px dashed var(--br);border-radius:7px;font-size:13px;text-align:center;outline:none}
.saddbtn{background:var(--gn);color:#fff;border:none;border-radius:7px;padding:7px 12px;font-weight:700;font-size:13px;cursor:pointer}
.recalc{width:100%;margin-top:10px;padding:10px;background:var(--bl);color:#fff;border:none;border-radius:8px;font-family:Nunito,sans-serif;font-weight:700;font-size:13px;cursor:pointer}
.ccard{background:#fff;border-radius:12px;padding:18px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:14px}
.ctitle{font-family:Nunito,sans-serif;font-weight:800;font-size:15px;color:var(--bl);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.addbtn{background:var(--gn);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:Nunito,sans-serif;font-weight:700;font-size:12px;cursor:pointer}
.conrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5}
.conrow:last-child{border-bottom:none}
.coname{flex:1;font-weight:600;font-size:14px}.coph{font-size:12px;color:var(--mu)}.coph.no{color:var(--rd)}
.ebtn{background:var(--bl);color:#fff;border:none;border-radius:7px;padding:6px 11px;font-size:12px;font-weight:700;cursor:pointer}
.dbtn2{background:var(--rd);color:#fff;border:none;border-radius:7px;padding:6px 9px;font-size:12px;font-weight:700;cursor:pointer}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.mo.on{display:flex}
.md{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:400px}
.mdtitle{font-family:Nunito,sans-serif;font-weight:800;font-size:16px;color:var(--bl);margin-bottom:16px}
.md label{font-size:11px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px;margin-top:12px}
.md input{width:100%;padding:10px;border:1.5px solid var(--br);border-radius:8px;font-size:14px;outline:none}
.md input:focus{border-color:var(--bl)}
.mdbtns{display:flex;gap:8px;margin-top:18px}
.mdbtns button{flex:1;padding:12px;border:none;border-radius:9px;font-family:Nunito,sans-serif;font-weight:700;font-size:14px;cursor:pointer}
.mdsave{background:var(--gn);color:#fff}.mdcan{background:#f0f0f0;color:var(--mu)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a3a8f;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:300;display:none;white-space:nowrap}
.toast.on{display:block}
</style>

function setMode(di,size){
  var day=SCH[di];day.team_size=size;day.is_trio=(size>2);
  if(size>2){var all=(day.t1||[]).concat(day.t2||[]);day.t1=calcEtas(all,size);day.t2=[];}
  else{var all=day.t1||[];var mid=Math.ceil(all.length/2);day.t1=calcEtas(all.slice(0,mid),PPT);day.t2=calcEtas(all.slice(mid),PPT);}
  selDay(di);renderSch();
  var lb={2:"&#9989; 2 times",3:"&#9989; Trio &#247;3",4:"&#9989; Quarteto &#247;4"};

function setupRemDrag(di,p){
  document.querySelectorAll("#rem-wrap [id^='tl-']").forEach(function(list){
    var key=list.dataset.key,dr=null,tdr=null;
    list.querySelectorAll(".crow").forEach(function(row){
      row.addEventListener("dragstart",function(e){dr=row;row.classList.add("dragging");e.dataTransfer.effectAllowed="move";});
      row.addEventListener("dragend",function(){row.classList.remove("dragging");list.querySelectorAll(".crow").forEach(function(r){r.classList.remove("drag-over");});remSave(di,key,list,p);dr=null;});
      row.addEventListener("dragover",function(e){e.preventDefault();if(!dr||row===dr)return;list.querySelectorAll(".crow").forEach(function(r){r.classList.remove("drag-over");});row.classList.add("drag-over");var m=row.getBoundingClientRect().top+row.offsetHeight/2;list.insertBefore(dr,e.clientY<m?row:row.nextSibling);});
      row.addEventListener("dragleave",function(){row.classList.remove("drag-over");});
      var hd=row.querySelector(".dh");if(!hd)return;
      hd.addEventListener("touchstart",function(e){tdr=row;row.classList.add("dragging");e.stopPropagation();e.preventDefault();},{passive:false});
      hd.addEventListener("touchmove",function(e){
        if(!tdr)return;e.preventDefault();
        var t=e.touches[0],els=document.elementsFromPoint(t.clientX,t.clientY),tgt=null;
        for(var i=0;i<els.length;i++){if(els[i].classList.contains("crow")&&els[i]!==tdr&&els[i].closest("[id^='tl-']")===list){tgt=els[i];break;}}
        if(tgt){list.querySelectorAll(".crow").forEach(function(r){r.classList.remove("drag-over");});tgt.classList.add("drag-over");var m=tgt.getBoundingClientRect().top+tgt.offsetHeight/2;list.insertBefore(tdr,t.clientY<m?tgt:tgt.nextSibling);}
      },{passive:false});
      hd.addEventListener("touchend",function(){if(!tdr)return;tdr.classList.remove("dragging");list.querySelectorAll(".crow").forEach(function(r){r.classList.remove("drag-over");});remSave(di,key,list,p);tdr=null;});
    });
  });
}
function remSave(di,key,list,p){
  var day=SCH[di];
  var src=key==="trio"?(day.t1||[]).concat(day.t2||[]):(key==="t1"?day.t1:day.t2)||[];
  var rows=list.querySelectorAll(".crow"),re=[];
  rows.forEach(function(r){var n=r.dataset.name;var f=src.find(function(c){return c.name===n;});if(f)re.push(f);});
  src.forEach(function(c){if(!re.find(function(x){return x.name===c.name;}))re.push(c);});
  re=calcEtas(re,p);
  if(key==="trio"){day.t1=re;day.t2=[];}else if(key==="t1")day.t1=re;else day.t2=re;
  rows.forEach(function(r,i){if(!re[i])return;var eta=re[i].eta_ampm||"";var eb=r.querySelector(".etab");if(eb){eb.textContent=eta;eb.className="etab "+(eta.indexOf("PM")>=0?"pm":"am");}var q=queue.find(function(x){return x.name===re[i].name;});if(q)q.eta=eta;});
  renderWA();showToast("&#9989; Rota salva!");
}

function smsMsg(eta){return"Dear customer,\n\nJust a friendly reminder that your house cleaning is scheduled for tomorrow around "+eta+".\n\nIf you won't be home, please ensure we have access to the property by leaving a key in a safe place and let us know where it is, or by providing a key copy if you haven't already done so.\n\nKind regards,\nRenata\nSetup Cleaning Services";}
function markSent(name){sent[name]=true;var el=document.getElementById("cr_"+name.replace(/[^a-zA-Z0-9]/g,"_"));if(el)el.classList.add("sent");setTimeout(updBtn,400);}
function updBtn(){
  var btn=document.getElementById("nbtn"),prg=document.getElementById("prg");

  if(!rem.length){btn.textContent="All SMS sent! \u2705";btn.className="nbtn done";prg.textContent=queue.length+"/"+queue.length+" sent";return;}
  btn.textContent="Send SMS to "+rem[0].fn+" ("+(queue.length-rem.length+1)+"/"+queue.length+")";
  btn.className="nbtn";prg.textContent=(queue.length-rem.length)+"/"+queue.length+" sent";
}
function nextSMS(){var rem=queue.filter(function(c){return!sent[c.name];});if(!rem.length)return;var c=rem[0];markSent(c.name);window.location.href="sms:"+c.phone+"&body="+encodeURIComponent(smsMsg(c.eta));}

  lines.push("Meet Point  7:30 am at 17 Kaloma Road, The Gap. (Garagem)","Pls arrival time photo","\uD83D\uDCF8","\uD83D\uDE18\uD83D\uDE18\uD83D\uDE18\uD83D\uDE18","","\uD83D\uDCCB Schedule:");

function cpWA(t){
  var el=document.getElementById("wam-"+t),btn=document.getElementById("wab-"+t);
  var txt=el.textContent||el.innerText;
  function ok(){btn.textContent="\u2705 Copiado!";btn.classList.add("ok");setTimeout(function(){btn.textContent="&#128203; Copiar";btn.classList.remove("ok");},3000);}
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(txt).then(ok);
  else{var ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);ok();}
}

function schTog(di){var b=document.getElementById("sb-"+di),a=document.getElementById("sa-"+di),o=b.classList.toggle("op");a.textContent=o?"\u25b2":"\u25bc";}
function schDur(di,tk,ci,val){
  var day=SCH[di],ts=getTs(day),p=ts>2?ts:PPT;
  var arr=(tk==="trio"?day.t1:(tk==="t1"?day.t1:day.t2))||[];
  if(arr[ci])arr[ci].dur=parseFloat(val)||0;
  arr=calcEtas(arr,p);
  if(tk==="trio"||tk==="t1")day.t1=arr;else day.t2=arr;
  arr.forEach(function(c,i){var el=document.getElementById("se-"+di+"-"+tk+"-"+i);if(el)el.textContent=c.eta_ampm||"\u2014";});
}
function schRecalc(di){
  var day=SCH[di],ts=getTs(day);
  if(ts>2){day.t1=calcEtas((day.t1||[]).concat(day.t2||[]),ts);day.t2=[];}
  else{day.t1=calcEtas(day.t1||[],PPT);day.t2=calcEtas(day.t2||[],PPT);}
  renderSch();document.getElementById("sb-"+di).classList.add("op");document.getElementById("sa-"+di).textContent="\u25b2";
  if(curDi===di)selDay(di);showToast("\u2705 ETAs recalculados!");
}

var editIdx=-1;
function openMod(idx){
  editIdx=idx;
  var cs=CON.slice().sort(function(a,b){return a.name.localeCompare(b.name);});
  document.getElementById("mdtitle").textContent=idx>=0?"Edit Contact":"Add Contact";
  document.getElementById("mname").value=idx>=0?cs[idx].name:"";
  document.getElementById("mphone").value=idx>=0?(cs[idx].phone||""):"";
  document.getElementById("modal").classList.add("on");
}
function closeMod(){document.getElementById("modal").classList.remove("on");}
function saveCon(){
  var n=document.getElementById("mname").value.trim(),p=document.getElementById("mphone").value.trim();
  if(!n){alert("Name required.");return;}
  var sorted=CON.slice().sort(function(a,b){return a.name.localeCompare(b.name);});
  if(editIdx>=0){var orig=sorted[editIdx];var i=CON.findIndex(function(c){return c.name===orig.name;});if(i>=0)CON[i]={name:n,phone:p};}
  else CON.push({name:n,phone:p});
  closeMod();renderCon();showToast(editIdx>=0?"Updated!":"Added!");
}
function delCon(idx){
  cfmShow("Apagar este contato?",function(){
    var sorted=CON.slice().sort(function(a,b){return a.name.localeCompare(b.name);});
    var orig=sorted[idx];var i=CON.findIndex(function(c){return c.name===orig.name;});
    if(i>=0)CON.splice(i,1);renderCon();showToast("Deleted!");
  });
}
function showToast(m){var t=document.getElementById("toast");t.innerHTML=m;t.classList.add("on");setTimeout(function(){t.classList.remove("on");},2500);}

(function(){
  var today=new Date();
  var tom=new Date(today);tom.setDate(today.getDate()+1);
  var tDay=String(tom.getDate()).padStart(2,"0");
  var ti=SCH.findIndex(function(d){return String(parseInt(d.date||0)).padStart(2,"0")===tDay;});
  var idx=ti>=0?ti:0;
  selDay(idx);
  var btns=document.querySelectorAll(".dbtn");
  if(btns[idx]){btns[idx].classList.add("on");btns[idx].scrollIntoView({block:"nearest",inline:"center"});}
})();

</script>
